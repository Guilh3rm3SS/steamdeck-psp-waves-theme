<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Ribbons XMB V2.0 Preview</title>
    <link rel="stylesheet" href="Animated PSP Waves Background/theme.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            /* Removido o preto */
            font-family: 'Segoe UI', sans-serif;
        }

        /* Forçamos a visibilidade no Preview (ignora o z-index -1 do index.css) */
        .gamepadhomerecentgames_RecentGamesBackgroundContainer_QNkOt {
            z-index: 0 !important;
        }

        .ui-mockup {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Mockup do Decky Menu */
        .decky-menu {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 300px;
            height: 500px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 50;
            padding: 20px;
            color: white;
        }

        .line-item {
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="ui-mockup">
        <h2 style="margin:0">Glowing Ribbons XMB</h2>
        <p style="font-size: 12px; opacity: 0.6;">V2.0 - Shader Master Edition</p>
    </div>

    <!-- Simulação do Menu do Decky -->

    <!-- Estrutura Real injetada pelo Steam Deck -->
    <div class="gamepadhomerecentgames_RecentGamesBackgroundContainer_QNkOt">
        <div></div> <!-- Onda 3 e Onda 5 (::before) -->
        <div></div> <!-- Onda 4 e Partículas (::after) -->
    </div>

</body>

</html>
